name: chuma
region: nyc

services:
  - name: web
    github:
      repo: YOUR_GITHUB_USER/YOUR_REPO
      branch: main
      deploy_on_push: true
    source_dir: web
    dockerfile_path: web/Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        value: ${APP_URL}
      - key: NEXTAUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: NEXT_PUBLIC_API_BASE_URL
        scope: RUN_TIME
        value: ${APP_URL}/api
      - key: API_BASE_URL
        scope: RUN_TIME
        value: ${APP_URL}/api

  - name: api
    github:
      repo: YOUR_GITHUB_USER/YOUR_REPO
      branch: main
      deploy_on_push: true
    source_dir: api
    dockerfile_path: api/Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
    envs:
      - key: APP_ENV
        scope: RUN_TIME
        value: production
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: APP_ORIGIN
        scope: RUN_TIME
        value: ${APP_URL}
      - key: ADMIN_BOOTSTRAP_EMAIL
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_BOOTSTRAP_PASSWORD
        scope: RUN_TIME
        type: SECRET
