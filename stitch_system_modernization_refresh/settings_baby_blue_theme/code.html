<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                  "on-primary-fixed-variant": "#1d2b2b",
                  "outline-variant": "#d1dce0",
                  "surface": "#ffffff",

          "spacing": {

                  "base": "4px",
                  "gutter": "16px",
                  "container-padding-mobile": "20px",
                  "stack-md": "16px",
                  "container-padding-desktop": "40px",
                  "stack-lg": "24px"
          },
          "fontFamily": {
                  "label-caps": ["Plus Jakarta Sans"],
                  "headline-lg": ["Plus Jakarta Sans"],
                  "body-lg": ["Manrope"],
                  "label-bold": ["Manrope"],

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #ffffff;
    }
    .custom-shadow {
      box-shadow: 0px 4px 12px rgba(69, 123, 157, 0.08);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body-lg text-on-surface min-h-screen pb-32">
<!-- Top App Bar -->
<header class="bg-surface flex items-center justify-between px-container-padding-mobile py-stack-md w-full sticky top-0 z-40 transition-all duration-300 border-b border-outline-variant/30">
<div class="flex items-center gap-stack-sm">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden border-2 border-primary-container shadow-sm">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvImtAebDGWk9plGZ_H4ToMhi9c8B1uBWmSfHFjtN7xsnFcUsQRrFA43s0apnqzG-pv6oq6D3PdtQe6BTYCwZX2vxoEI7DLQm5xpNDtoiYYWx3JoQOLhqmYuCFdumsepzPCRD0wetV0gnPAxp_5Leq_6raps72pZVA91QXXQMz1XGVIZSdway6FwUYrk9rcruawhg79DBZvr3_z2O2PgRaZwZ7M49UCjqyu7lPVBk_XRiyFnxS2mln"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Settings</h1>
</div>
<div class="flex gap-stack-md">
<button class="material-symbols-outlined text-primary p-2 hover:bg-surface-container-low rounded-full transition-colors active:scale-95">notifications</button>
</div>
</header>
<main class="max-w-[1280px] mx-auto px-container-padding-mobile pt-stack-lg">
<!-- User Info Section -->
<section class="mb-stack-lg">
<div class="bg-surface-container-lowest rounded-[24px] p-stack-lg border border-outline-variant shadow-sm transition-transform hover:shadow-md active:scale-[0.98]">
<p class="font-body-sm text-on-surface-variant opacity-70 mb-1">Logged in as</p>
<p class="font-label-bold text-label-bold text-on-surface text-lg">test@example.com</p>
</div>
</section>
<!-- Preferences Group -->
<section class="mb-stack-lg">
<h2 class="font-title-md text-title-md text-on-surface mb-stack-md px-1">Preferences</h2>
<div class="space-y-stack-md">
<!-- Currency Card -->
<div class="bg-surface-container-lowest rounded-[24px] p-stack-lg border border-outline-variant shadow-sm flex items-center justify-between group cursor-pointer hover:bg-surface-container-low transition-colors">
<div>
<p class="font-label-bold text-label-bold text-primary mb-1">Currency</p>
<p class="font-body-lg text-body-lg text-on-surface-variant">ZMW (Zambian Kwacha)</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</div>
<!-- Theme Card -->
<div class="bg-surface-container-lowest rounded-[24px] p-stack-lg border border-outline-variant shadow-sm flex items-center justify-between group cursor-pointer hover:bg-surface-container-low transition-colors">
<div>
<p class="font-label-bold text-label-bold text-primary mb-1">Theme</p>
<p class="font-body-lg text-body-lg text-on-surface-variant">Light (system default)</p>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline">light_mode</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</div>
</div>
<!-- Notifications Card -->
<div class="bg-surface-container-lowest rounded-[24px] p-stack-lg border border-outline-variant shadow-sm flex items-center justify-between group cursor-pointer hover:bg-surface-container-low transition-colors">
<div>
<p class="font-label-bold text-label-bold text-primary mb-1">Notifications</p>
<p class="font-body-lg text-body-lg text-on-surface-variant">Disabled</p>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</div>
</div>
</div>
</section>
<!-- Data & Privacy Group -->
<section class="mb-stack-lg">
<h2 class="font-title-md text-title-md text-on-surface mb-stack-md px-1">Data</h2>
<div class="space-y-stack-md">
<button class="w-full bg-primary-container text-on-primary-container font-label-bold text-label-bold py-4 px-stack-lg rounded-[24px] shadow-sm hover:brightness-105 active:scale-95 transition-all flex items-center justify-center gap-stack-sm">
<span class="material-symbols-outlined">download</span>
          Export Data
        </button>
<button class="w-full bg-surface-container-lowest text-primary font-label-bold text-label-bold py-4 px-stack-lg rounded-[24px] border border-primary-container hover:bg-surface-container-low active:scale-95 transition-all flex items-center justify-center gap-stack-sm">
<span class="material-symbols-outlined">logout</span>
          Sign Out
        </button>
</div>
</section>
<!-- Aesthetic Decorative Element -->
<div class="grid grid-cols-2 gap-stack-md mt-12">
<div class="bg-tertiary-fixed h-32 rounded-[24px] p-4 flex flex-col justify-end overflow-hidden relative group border border-outline-variant/30">
<div class="absolute -top-4 -right-4 w-16 h-16 bg-primary-container rounded-full opacity-20 transition-transform group-hover:scale-150 duration-700"></div>
<p class="font-label-caps text-label-caps text-on-tertiary-fixed-variant">Usage Tip</p>
<p class="font-label-bold text-label-bold text-primary leading-tight">Dark mode saves 15% battery</p>
</div>
<div class="bg-primary-container h-32 rounded-[24px] p-4 flex flex-col justify-end overflow-hidden relative group">
<div class="absolute -bottom-4 -left-4 w-20 h-20 bg-white rounded-full opacity-30 transition-transform group-hover:rotate-12 duration-700"></div>
<p class="font-label-caps text-label-caps text-on-primary-fixed-variant">Privacy</p>
<p class="font-label-bold text-label-bold text-on-primary-container leading-tight">Data is end-to-end encrypted</p>
</div>
</div>
</main>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface-container-lowest shadow-[0px_-4px_12px_rgba(69,123,157,0.05)] rounded-t-xl flex justify-around items-center px-4 py-2 border-t border-outline-variant/30">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-bold text-label-bold">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-label-bold text-label-bold">Transactions</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="add_circle">add_circle</span>
<span class="font-label-bold text-label-bold">Add</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-label-bold text-label-bold">Reports</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-label-bold text-label-bold">Settings</span>
</button>
</nav>
<script>
    document.querySelectorAll('.cursor-pointer').forEach(el => {
      el.addEventListener('click', () => {
        // Interactive visual feedback already handled by Tailwind
      });
    });
  </script>
</body></html>
