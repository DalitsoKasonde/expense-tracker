<script>
        // Micro-interactions and effects
        document.querySelectorAll('button, a').forEach(element => {
            element.addEventListener('click', function(e) {
                // Haptic feedback logic could go here

        });

        // Toggle simulation for Biometric Switch
        const biometricToggle = document.querySelector('.bg-secondary-container.w-10');
        if(biometricToggle) {
            biometricToggle.addEventListener('click', function() {
                const dot = this.querySelector('div');
                if(dot.classList.contains('translate-x-0')) {
                    dot.classList.remove('translate-x-0');
                    dot.classList.add('translate-x-[-16px]');
                    this.classList.remove('bg-secondary-container');
                    this.classList.add('bg-outline-variant');
                } else {
                    dot.classList.add('translate-x-0');
                    dot.classList.remove('translate-x-[-16px]');
                    this.classList.add('bg-secondary-container');
                    this.classList.remove('bg-outline-variant');
                }
            });
        }
