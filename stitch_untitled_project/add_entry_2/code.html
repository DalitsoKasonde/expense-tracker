<script>
        function setActiveType(type) {
            const btnExpense = document.getElementById('btn-expense');
            const btnIncome = document.getElementById('btn-income');
            
            if (type === 'expense') {
                btnExpense.classList.add('bg-white', 'text-primary', 'shadow-sm');
                btnExpense.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
                btnIncome.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
                btnIncome.classList.remove('bg-white', 'text-primary', 'shadow-sm');
            } else {
                btnIncome.classList.add('bg-white', 'text-primary', 'shadow-sm');
                btnIncome.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
                btnExpense.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
                btnExpense.classList.remove('bg-white', 'text-primary', 'shadow-sm');
            }
        }

        // Simple animation on load
        document.addEventListener('DOMContentLoaded', () => {
            const sections = document.querySelectorAll('section, .pt-md');
            sections.forEach((section, index) => {
                section.style.opacity = '0';
                section.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    section.style.transition = 'all 0.4s ease-out';
                    section.style.opacity = '1';
                    section.style.transform = 'translateY(0)';
                }, index * 80);
            });
        });
    </script>
