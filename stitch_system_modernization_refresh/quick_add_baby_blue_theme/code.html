<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-white flex items-center justify-between px-container-padding-mobile py-stack-md w-full sticky top-0 z-50 border-b border-gray-50">

<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border border-outline-variant">

<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Quick Add</h1>
</div>
<button class="material-symbols-outlined text-primary hover:bg-surface-container-low transition-colors p-2 rounded-full active:scale-95 transition-transform" data-icon="notifications">
      notifications

</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-padding-mobile pb-32">
<div class="max-w-md mx-auto py-stack-lg space-y-stack-lg">
<!-- Form Card -->
<section class="bg-white rounded-[24px] p-stack-lg soft-shadow border border-gray-100">
<form class="space-y-stack-lg" id="transactionForm">
<!-- Amount Input -->
<div class="space-y-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface" for="amount">Amount (ZMW)</label>
<div class="relative group">
<input class="w-full h-12 px-gutter bg-white border border-outline-variant rounded-xl font-body-lg text-body-lg text-on-surface focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed outline-none input-transition" id="amount" name="amount" placeholder="0.00" required="" step="0.01" type="number"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline font-label-bold">ZMW</div>
</div>
</div>
<!-- Type Dropdown -->
<div class="space-y-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface" for="type">Type</label>
<div class="relative">
<select class="w-full h-12 px-gutter appearance-none bg-white border border-outline-variant rounded-xl font-body-lg text-body-lg text-on-surface focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed outline-none input-transition cursor-pointer" id="type" name="type" required="">
<option value="expense">Expense</option>
<option value="income">Income</option>
<option value="transfer">Transfer</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Category Selection -->
<div class="space-y-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface">Category</label>
<div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
<button class="flex-shrink-0 px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-label-bold flex items-center gap-2 hover:border-primary hover:text-primary transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-[20px]">shopping_cart</span>
                Groceries
              </button>
<button class="flex-shrink-0 px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-label-bold flex items-center gap-2 hover:border-primary hover:text-primary transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-[20px]">commute</span>
                Transport
              </button>
<button class="flex-shrink-0 px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-label-bold flex items-center gap-2 hover:border-primary hover:text-primary transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-[20px]">restaurant</span>
                Dining
              </button>
<button class="flex-shrink-0 px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-label-bold flex items-center gap-2 hover:border-primary hover:text-primary transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-[20px]">more_horiz</span>

<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-label-bold text-label-bold">Transactions</span>
</a>
<!-- Active State: Add -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span class="font-label-bold text-label-bold">Add</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high rounded-full active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-label-bold text-label-bold">Portfolio</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high rounded-full active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-label-bold text-label-bold">Reports</span>
</a>
</nav>
<script>
    // Simple micro-interaction for form submission
    document.getElementById('transactionForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const originalContent = btn.innerHTML;
      
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Saving...';
      btn.classList.add('opacity-80', 'pointer-events-none');
      
      setTimeout(() => {
        btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Transaction Saved!';
        btn.classList.replace('bg-primary', 'bg-tertiary-container');
        btn.classList.replace('text-on-primary', 'text-on-tertiary-container');
        
        setTimeout(() => {
          btn.innerHTML = originalContent;
          btn.classList.replace('bg-tertiary-container', 'bg-primary');
          btn.classList.replace('text-on-tertiary-container', 'text-on-primary');
          btn.classList.remove('opacity-80', 'pointer-events-none');
          e.target.reset();
        }, 2000);
      }, 1500);
    });

    // Category button selection logic
    const categoryBtns = document.querySelectorAll('button[type="button"].flex-shrink-0');
    categoryBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        categoryBtns.forEach(b => {
          b.classList.remove('bg-primary-fixed', 'text-on-primary-fixed', 'border-primary-fixed');
          b.classList.add('bg-surface-container-low', 'text-on-surface-variant', 'border-outline-variant');
        });
        btn.classList.remove('bg-surface-container-low', 'text-on-surface-variant', 'border-outline-variant');
        btn.classList.add('bg-primary-fixed', 'text-on-primary-fixed', 'border-primary-fixed');
      });
    });
  </script>
